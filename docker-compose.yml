services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caravan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caravan_password}
      POSTGRES_DB: ${POSTGRES_DB:-caravan_hr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caravan} -d ${POSTGRES_DB:-caravan_hr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-caravan}:${POSTGRES_PASSWORD:-caravan_password}@postgres:5432/${POSTGRES_DB:-caravan_hr}?schema=public
      SESSION_DAYS: ${SESSION_DAYS:-30}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Qyzylorda}
      HIKVISION_WEBHOOK_TOKEN: ${HIKVISION_WEBHOOK_TOKEN:-change-me}
      UPLOAD_DIR: /app/storage/uploads
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - app_uploads:/app/storage/uploads

volumes:
  postgres_data:
  app_uploads:
